{% extends "layout.html" %}

{% block page_attrs %}{% if slug in ["/values/", "/purpose/", "/join/"] or slug[:7] == "/posts/" %} data-page-type="corner-logo"{% endif %}{% endblock %}

{% block body %}
  <div class="updates-overlay{% if overlay_classes %} {{ overlay_classes }}{% endif %}" aria-hidden="true">
    <div class="updates-letter" role="dialog" aria-label="{{ page.aria_label }}">
      <a class="updates-dismiss" href="{{ dismiss_url }}" aria-label="Dismiss" data-dismiss-url="{{ dismiss_url }}">×</a>
      <div class="letter-body">
        {{ content }}
      </div>
    </div>
  </div>
{% endblock %}
