{% extends "layout.html" %}

{% block page_attrs %}{% if slug in ["/values/", "/purpose/", "/join/"] or slug[:7] == "/posts/" %} data-page-type="corner-logo"{% endif %}{% endblock %}

{% block body %}
  <main class="content-page{% if page_classes %} {{ page_classes }}{% endif %}">
    <article class="content-surface" aria-label="{{ page.aria_label }}"{% if page.aria_i18n_key %} data-i18n-aria="common.aria.{{ page.aria_i18n_key }}"{% endif %}>
      <h1 class="visually-hidden"{% if page.i18n_key %} data-i18n="content.{{ page.i18n_key }}.title"{% endif %}>{{ title }}</h1>
      <div class="letter-body">
        {{ content }}
      </div>
    </article>
  </main>
{% endblock %}
