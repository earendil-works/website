{% extends "layout.html" %}

{% block page_attrs %}{% if slug in ["/values/", "/purpose/", "/join/"] or slug[:7] == "/posts/" %} data-page-type="corner-logo"{% endif %}{% endblock %}

{% block body %}
  <main class="content-page{% if page_classes %} {{ page_classes }}{% endif %}">
    <article class="content-surface" aria-label="{{ page.aria_label }}">
      <h1 class="visually-hidden">{{ title }}</h1>
      <div class="letter-body">
        {{ content }}
      </div>
    </article>
  </main>
{% endblock %}
