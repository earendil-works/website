<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} | EARENDIL</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon/square.svg">
  <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon/android-chrome-512x512.png">
  <link rel="preload" href="/static/fonts/DepartureMono-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/fonts/departure-mono.css">
  <link rel="stylesheet" href="/static/fonts/plantin-mt-pro.css">
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="preload" href="/static/paper.png" as="image">
  <link rel="preload" href="/static/paper-dark.png" as="image">
  <link rel="preload" href="/static/cursor-light.svg" as="image">
  <link rel="preload" href="/static/cursor-dark.svg" as="image">
  <link href="/posts/feed.atom" rel="alternate" title="Earendil Posts" type="application/atom+xml">
  <link href="/posts/feed.rss" rel="alternate" title="Earendil Posts" type="application/rss+xml">
</head>
<body hx-boost="true" hx-ext="head-support" hx-select="div.page" hx-target="div.page" hx-swap="outerHTML" class="{% if slug != "/" %}skip-intro{% endif %}">
  <!-- Background layer -->
  <canvas id="canvas"></canvas>
  
  <!-- Center logo (behind overlays) -->
  <a href="/" class="center-logo" dir="ltr">
    <img class="main-logo" id="logo" src="/static/earendil-logo.svg" alt="Earendil">
  </a>

  <!-- Page content layer -->
  <div class="page" hx-history-elt{% block page_attrs %}{% endblock %}>
    {% block body %}{% endblock %}
  </div>

  <!-- Chrome layer (always on top) -->
  <div id="fps">FPS: --</div>
  
  <nav class="top-nav" dir="ltr">
    <a class="nav-link" href="/purpose/" data-i18n="common.nav.purpose">Purpose</a>
    <a class="nav-link" href="/join/" data-i18n="common.nav.joinUs">Join Us</a>
    <a class="nav-link" href="https://lefos.com" target="_blank" rel="noopener noreferrer" data-i18n="common.nav.lefos">Lefos</a>
    <a class="nav-link" href="/posts/" data-i18n="common.nav.posts">Posts</a>
    <a class="nav-link" href="https://github.com/earendil-works/" target="_blank" rel="noopener noreferrer" data-i18n="common.nav.works">Works</a>
  </nav>

  <div id="site-footer" dir="ltr" data-i18n="common.site.footer">EARENDIL INC.</div>
  
  <div class="bottom-controls" dir="ltr">
    <div id="lang-picker" class="lang-picker">
      <button id="lang-toggle" type="button" aria-label="Change language" aria-expanded="false" aria-haspopup="listbox">
        <span class="lang-current">EN</span>
      </button>
      <ul id="lang-menu" class="lang-menu" role="listbox" aria-label="Select language" hidden></ul>
    </div>
    <button id="theme-toggle" type="button" aria-label="Toggle color theme"><span class="value"></span></button>
  </div>

  <script src="/static/htmx-bundle.min.js"></script>
  <script>
    htmx.config.scrollIntoViewOnBoost = false;

    function htmxFallbackToNative(evt) {
      var path = evt.detail?.pathInfo?.requestPath || evt.detail?.requestConfig?.path;
      if (path) {
        window.location.href = path;
      }
    }

    htmx.on('htmx:sendError', htmxFallbackToNative);
    htmx.on('htmx:swapError', htmxFallbackToNative);
    htmx.on('htmx:responseError', htmxFallbackToNative);

    htmx.on('htmx:beforeSwap', function() {
      document.body.classList.add('skip-intro');
    });

    htmx.on('htmx:afterSettle', function() {
      if (window.i18n) {
        window.i18n.updateDOM();
      }
    });
  </script>
  <script src="/static/i18n.js"></script>
  <script src="/static/script.js"></script>
</body>
</html>
