name: Deploy Subscribe API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-subscribe-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd api
          npm install

      - name: Type check
        run: |
          cd api
          npm run typecheck

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: api

      - name: Deployment summary
        run: |
          echo "## ✅ Subscribe API deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${GITHUB_SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Worker: \`earendil-subscribe-api\`" >> $GITHUB_STEP_SUMMARY
